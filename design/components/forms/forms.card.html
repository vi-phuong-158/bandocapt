<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0..1,0&display=swap" rel="stylesheet">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-card); padding: 24px; }
  .stack { display: flex; flex-direction: column; gap: 18px; max-width: 460px; }
  .material-symbols-outlined { font-family: 'Material Symbols Outlined'; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { SearchBar, FilterTabs } = window.BNCNgAnSDesignSystem_c0346a;
  const OPTIONS = [
    { id: 'police', label: 'Công an', icon: 'local_police' },
    { id: 'cccd', label: 'Điểm CCCD', icon: 'badge', color: 'var(--color-cccd)' },
    { id: 'nearby', label: 'Gần tôi', icon: 'near_me', color: 'var(--color-nearby)' },
  ];
  function Demo() {
    const [sel, setSel] = React.useState(['police', 'cccd']);
    const toggle = (id) => setSel(s => s.includes(id) ? s.filter(x => x !== id) : [...s, id]);
    return (
      <div className="stack">
        <SearchBar defaultValue="Công an phường" />
        <FilterTabs options={OPTIONS} selected={sel} onToggle={toggle} />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
