<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0..1,0&display=swap" rel="stylesheet">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-card); padding: 24px; }
  .stack { display: flex; flex-direction: column; gap: 18px; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .material-symbols-outlined { font-family: 'Material Symbols Outlined'; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Button, IconButton } = window.BNCNgAnSDesignSystem_c0346a;
  function Demo() {
    return (
      <div className="stack">
        <div className="row">
          <Button variant="primary" icon="directions">Chỉ đường</Button>
          <Button variant="soft" icon="call">Gọi điện</Button>
          <Button variant="secondary">Đóng</Button>
          <Button variant="amber" icon="badge">Điểm CCCD</Button>
          <Button variant="ghost">Xem thêm</Button>
        </div>
        <div className="row">
          <Button size="sm" variant="primary">Nhỏ</Button>
          <Button size="md" variant="primary">Vừa</Button>
          <Button size="lg" variant="primary" iconRight="arrow_forward">Lớn</Button>
          <Button variant="primary" disabled>Vô hiệu</Button>
        </div>
        <div className="row">
          <IconButton variant="fab" icon="my_location" fill label="Vị trí" size="lg" />
          <IconButton variant="glass" icon="add" label="Phóng to" size="lg" />
          <IconButton variant="glass" icon="remove" label="Thu nhỏ" size="lg" />
          <IconButton variant="scrim" icon="arrow_back" label="Quay lại" />
          <IconButton variant="soft" icon="close" label="Đóng" />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
