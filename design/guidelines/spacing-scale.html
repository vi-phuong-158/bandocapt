<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing Scale" subtitle="4px base · 4 → 32px" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-card); padding: 24px; }
  .row { display: flex; align-items: flex-end; gap: 18px; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: var(--color-primary); border-radius: 4px; width: 100%; }
  .lab { font-size: 11px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
  .col b { font-size: 11px; color: var(--slate-700); }
</style>
</head>
<body>
  <div class="row">
    <div class="col" style="width:40px"><div class="bar" style="height:4px"></div><b>1</b><span class="lab">4</span></div>
    <div class="col" style="width:40px"><div class="bar" style="height:8px"></div><b>2</b><span class="lab">8</span></div>
    <div class="col" style="width:40px"><div class="bar" style="height:12px"></div><b>3</b><span class="lab">12</span></div>
    <div class="col" style="width:40px"><div class="bar" style="height:16px"></div><b>4</b><span class="lab">16</span></div>
    <div class="col" style="width:40px"><div class="bar" style="height:20px"></div><b>5</b><span class="lab">20</span></div>
    <div class="col" style="width:40px"><div class="bar" style="height:24px"></div><b>6</b><span class="lab">24</span></div>
    <div class="col" style="width:40px"><div class="bar" style="height:28px"></div><b>7</b><span class="lab">28</span></div>
    <div class="col" style="width:40px"><div class="bar" style="height:32px"></div><b>8</b><span class="lab">32</span></div>
  </div>
</body>
</html>
