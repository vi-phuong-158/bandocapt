<!-- @dsCard group="Brand" viewport="700x180" name="Logo & Mascot" subtitle="CAND emblem + AI assistant mascot" -->
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-card); padding: 24px; display: flex; gap: 28px; align-items: center; }
  .lockup { display: flex; align-items: center; gap: 14px; }
  .lockup img { width: 56px; height: 56px; object-fit: contain; }
  h1 { font-family: var(--font-display); font-size: 18px; font-weight: 800; margin: 0; color: var(--text-strong); line-height: 1.15; }
  p { margin: 2px 0 0; font-size: 13px; color: var(--text-muted); }
  .sep { width: 1px; height: 64px; background: var(--slate-200); }
  .mascot { display: flex; align-items: center; gap: 14px; }
  .mascot img { width: 64px; height: 64px; object-fit: contain; }
  .mascot .t { font-size: 12px; color: var(--text-muted); }
  .mascot .t b { display:block; color: var(--slate-700); font-size: 13px; }
</style>
</head>
<body>
  <div class="lockup">
    <img src="../assets/logo.png" alt="Công an nhân dân emblem">
    <div><h1>Bản đồ Công an số</h1><p>Tỉnh Phú Thọ</p></div>
  </div>
  <div class="sep"></div>
  <div class="mascot">
    <img src="../assets/icon.png" alt="AI assistant mascot">
    <div class="t"><b>Trợ lý AI</b>Chatbot avatar</div>
  </div>
</body>
</html>
