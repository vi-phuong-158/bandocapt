<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-card); padding: 18px 24px; color: var(--text-body); }
  .r { display: flex; align-items: baseline; gap: 16px; padding: 5px 0; border-bottom: 1px solid var(--slate-100); }
  .r:last-child { border: 0; }
  .tag { width: 120px; font-size: 11px; color: var(--text-muted); flex-shrink: 0; }
  .d { font-family: var(--font-display); }
</style>
</head>
<body>
  <div class="r"><span class="tag">2xl · display 800</span><span class="d" style="font-size:26px;font-weight:800">Tên trụ sở</span></div>
  <div class="r"><span class="tag">lg · display 700</span><span class="d" style="font-size:18px;font-weight:700">Bản đồ Công an số</span></div>
  <div class="r"><span class="tag">md · body 700</span><span style="font-size:16px;font-weight:700">Công an phường Việt Trì</span></div>
  <div class="r"><span class="tag">base · body 500</span><span style="font-size:15px;font-weight:500">Nhập tên đơn vị, phường xã…</span></div>
  <div class="r"><span class="tag">sm · body 500</span><span style="font-size:13px;font-weight:500;color:var(--text-muted)">Số 12 Đại lộ Hùng Vương</span></div>
  <div class="r"><span class="tag">2xs · body 800 caps</span><span style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--color-primary)">Sẵn sàng hỗ trợ</span></div>
</body>
</html>
