<!-- @dsCard group="Spacing" viewport="700x180" name="Shadow & Elevation" subtitle="Soft layered shadows + frosted glass" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-muted); padding: 28px 24px; }
  .row { display: flex; gap: 22px; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 12px; flex: 1; }
  .box { width: 100%; height: 80px; background: var(--surface-card); border-radius: var(--radius-lg); }
  b { font-size: 12px; color: var(--slate-700); } span { font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="box" style="box-shadow:var(--shadow-sm)"></div><b>sm</b></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-card)"></div><b>card</b></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-card-hover)"></div><b>card-hover</b></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-pop)"></div><b>pop</b><span>popovers/chat</span></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-fab);background:var(--color-primary)"></div><b>fab</b><span>tinted</span></div>
  </div>
</body>
</html>
