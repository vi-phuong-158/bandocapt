<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0&display=swap" rel="stylesheet">
<style>
  body { margin: 0; font-family: var(--font-body);
    background: linear-gradient(120deg,#cfd9ea,#dde6d4 50%,#bcd0e6); padding: 30px 24px; }
  .row { display: flex; gap: 56px; align-items: center; justify-content: center; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .pin { width: 44px; height: 44px; position: relative; }
  .icon { width: 38px; height: 38px; border-radius: 50% 50% 50% 0; transform: rotate(-45deg);
    display: flex; align-items: center; justify-content: center; border: 2px solid #fff;
    box-shadow: 0 4px 12px rgba(0,0,0,.18); }
  .icon .ms { transform: rotate(45deg); color: #fff; font-size: 20px; font-variation-settings: 'FILL' 1; }
  .ms { font-family: 'Material Symbols Outlined'; }
  .lab { font-size: 12px; font-weight: 700; color: var(--slate-700); }
  .dot { width: 22px; height: 22px; border-radius: 50%; background: var(--blue-600); border: 3px solid #fff; box-shadow: 0 0 14px rgba(37,99,235,.5); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="pin"><div class="icon" style="background:var(--color-primary)"><span class="ms">local_police</span></div></div><span class="lab">Công an</span></div>
    <div class="item"><div class="pin"><div class="icon" style="background:var(--color-cccd)"><span class="ms">badge</span></div></div><span class="lab">Điểm CCCD</span></div>
    <div class="item"><div class="dot"></div><span class="lab">Vị trí của bạn</span></div>
  </div>
</body>
</html>
