<!-- @dsCard group="Brand" viewport="700x150" name="Iconography" subtitle="Material Symbols Outlined — the only icon set" -->
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0..1,0&display=swap" rel="stylesheet">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-card); padding: 22px 24px; }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .chip { display: flex; flex-direction: column; align-items: center; gap: 6px; width: 76px; }
  .ms { font-family: 'Material Symbols Outlined'; font-size: 26px; color: var(--color-primary);
    width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
    background: var(--blue-50); border-radius: var(--radius-md); }
  .chip span:last-child { font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="chip"><span class="ms">search</span><span>search</span></div>
    <div class="chip"><span class="ms">local_police</span><span>local_police</span></div>
    <div class="chip"><span class="ms">badge</span><span>badge</span></div>
    <div class="chip"><span class="ms">near_me</span><span>near_me</span></div>
    <div class="chip"><span class="ms">location_on</span><span>location_on</span></div>
    <div class="chip"><span class="ms">directions</span><span>directions</span></div>
    <div class="chip"><span class="ms">call</span><span>call</span></div>
    <div class="chip"><span class="ms">chat_bubble</span><span>chat_bubble</span></div>
  </div>
</body>
</html>
