<!-- @dsCard group="Spacing" viewport="700x160" name="Corner Radii" subtitle="Soft UI leans round — 8 → 9999px" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-card); padding: 22px; }
  .row { display: flex; gap: 16px; align-items: center; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 1; }
  .box { width: 72px; height: 72px; background: var(--blue-50); border: 2px solid var(--color-primary); }
  .pill { width: 110px; height: 46px; border-radius: var(--radius-pill); }
  b { font-size: 12px; color: var(--slate-700); } span { font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="box" style="border-radius:var(--radius-sm)"></div><b>sm</b><span>8px</span></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-md)"></div><b>md</b><span>12px</span></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-lg)"></div><b>lg</b><span>16px</span></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-xl)"></div><b>xl</b><span>20px</span></div>
    <div class="col"><div class="box pill"></div><b>pill</b><span>9999px</span></div>
  </div>
</body>
</html>
