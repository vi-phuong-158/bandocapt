<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-card); padding: 22px 24px; color: var(--text-body); }
  p { margin: 0 0 8px; font-size: 15px; line-height: 1.58; max-width: 560px; }
  .b { font-weight: 700; }
  .muted { color: var(--text-muted); font-size: 13px; }
  .eyebrow { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .04em; color: var(--color-primary); margin-bottom: 6px; }
</style>
</head>
<body>
  <div class="eyebrow">Sẵn sàng hỗ trợ</div>
  <p>Xin chào! Tôi là <span class="b">Trợ lý ảo</span> tư vấn thủ tục hành chính cho người dân tỉnh Phú Thọ.</p>
  <p class="muted">Be Vietnam Pro · 400 regular · 500 medium · 700 bold · line-height 1.58</p>
</body>
</html>
