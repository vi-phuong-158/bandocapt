<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bản đồ số Công an & Điểm cấp CCCD - Phú Thọ</title>
    <!-- Thư viện giao diện Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Thư viện bản đồ Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* CSS tuỳ chỉnh cho bản đồ */
        #map {
            height: 100%;
            width: 100%;
            z-index: 1;
        }

        .custom-popup .leaflet-popup-content-wrapper {
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .icon-police {
            color: #1d4ed8;
        }

        /* Màu xanh công an */
        .icon-id {
            color: #b91c1c;
        }

        /* Màu đỏ CCCD */
    </style>
</head>

<body class="bg-gray-50 flex flex-col h-screen font-sans">

    <!-- Header -->
    <header class="bg-blue-800 text-white p-4 shadow-md flex justify-between items-center z-10 relative">
        <div class="flex items-center gap-3">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z">
                </path>
            </svg>
            <h1 class="text-xl font-bold">Bản Đồ Phục Vụ Nhân Dân - Phú Thọ</h1>
        </div>
        <div class="text-sm hidden sm:block">
            Phòng An ninh đối ngoại
        </div>
    </header>

    <!-- Main Content -->
    <div class="flex flex-1 overflow-hidden relative">

        <!-- Sidebar / Bộ lọc -->
        <aside
            class="w-64 bg-white shadow-lg p-4 flex flex-col gap-4 z-10 absolute sm:relative top-0 left-0 h-full transform -translate-x-full sm:translate-x-0 transition-transform duration-300 overflow-y-auto"
            id="sidebar">
            <h2 class="font-bold text-gray-800 text-lg border-b pb-2">Tìm kiếm & Bộ lọc</h2>

            <!-- Thanh tìm kiếm -->
            <div class="relative mt-2">
                <input type="text" id="search-input" placeholder="Nhập tên phường, xã..."
                    class="w-full pl-9 pr-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 text-sm">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <svg class="h-4 w-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </div>
            </div>

            <div class="flex flex-col gap-3 mt-2 border-t pt-3">
                <h3 class="text-sm font-semibold text-gray-600 mb-1">Loại địa điểm:</h3>
                <label class="flex items-center gap-2 cursor-pointer p-2 hover:bg-gray-100 rounded-md transition">
                    <input type="checkbox" id="filter-police" checked
                        class="w-5 h-5 text-blue-600 rounded focus:ring-blue-500">
                    <span class="flex items-center gap-2 text-gray-700">
                        <span class="w-3 h-3 rounded-full bg-blue-600 inline-block"></span>
                        Trụ sở Công an
                    </span>
                </label>

                <label class="flex items-center gap-2 cursor-pointer p-2 hover:bg-gray-100 rounded-md transition">
                    <input type="checkbox" id="filter-id" checked
                        class="w-5 h-5 text-red-600 rounded focus:ring-red-500">
                    <span class="flex items-center gap-2 text-gray-700">
                        <span class="w-3 h-3 rounded-full bg-red-600 inline-block"></span>
                        Điểm cấp Căn cước
                    </span>
                </label>
            </div>

            <div class="mt-auto bg-blue-50 p-3 rounded-lg border border-blue-100 text-sm text-blue-800">
                <p><strong>Hướng dẫn:</strong> Bấm vào các biểu tượng trên bản đồ để xem chi tiết địa chỉ và thông tin
                    liên hệ.</p>
            </div>
        </aside>

        <!-- Nút mở menu trên mobile -->
        <button id="menu-btn"
            class="sm:hidden absolute top-4 left-4 z-20 bg-white p-2 rounded-md shadow-md text-gray-700">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16">
                </path>
            </svg>
        </button>

        <!-- Khu vực Bản đồ -->
        <main class="flex-1 relative">
            <div id="map"></div>
            <!-- Nút Vị trí của tôi -->
            <button id="find-location-btn"
                class="absolute bottom-6 right-6 z-[1000] bg-white p-3 rounded-full shadow-lg text-blue-600 hover:bg-blue-50 transition-colors flex items-center justify-center group border border-gray-200"
                title="Vị trí của tôi">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 22s-8-4.5-8-11.8A8 8 0 0112 2a8 8 0 018 8.2c0 7.3-8 11.8-8 11.8z" />
                    <circle cx="12" cy="10" r="3" stroke-width="2" />
                </svg>
            </button>
        </main>
    </div>

    <!-- Thư viện bản đồ Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Code Dữ liệu Địa điểm chạy trước -->
    <script src="data.js"></script>

    <script>
        // 2. KHỞI TẠO BẢN ĐỒ
        // Tập trung tọa độ vào khu vực Việt Trì, Phú Thọ. Mức zoom 12
        const map = L.map('map').setView([21.325, 105.365], 12);

        // Sử dụng lớp bản đồ chuẩn của OpenStreetMap (Miễn phí)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors | Phát triển bởi Đoàn thanh niên',
            maxZoom: 19
        }).addTo(map);

        // 3. TẠO BIỂU TƯỢNG (ICONS) TUỲ CHỈNH
        const createIcon = (color, svgPath) => {
            return L.divIcon({
                className: 'custom-icon',
                html: `<div class="relative flex items-center justify-center w-10 h-10">
                        <svg class="absolute w-full h-full text-${color}-600 drop-shadow-md" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"></path>
                        </svg>
                        <svg class="absolute w-5 h-5 text-white mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            ${svgPath}
                        </svg>
                       </div>`,
                iconSize: [40, 40],
                iconAnchor: [20, 40], // Điểm nhọn chỉ xuống bản đồ
                popupAnchor: [0, -40] // Vị trí hiện popup
            });
        };

        // Icon khiên công an (cho Trụ sở)
        const policeIcon = createIcon('blue', '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>');
        // Icon thẻ (cho Điểm cấp CCCD)
        const idIcon = createIcon('red', '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5m-4 0V5a2 2 0 114 0v1m-4 0a2 2 0 104 0m-5 8a2 2 0 100-4 2 2 0 000 4zm0 0c1.306 0 2.417.835 2.83 2M9 14a3.001 3.001 0 00-2.83 2M15 11h3m-3 4h2"></path>');


        // 4. THÊM DỮ LIỆU LÊN BẢN ĐỒ VÀ PHÂN NHÓM
        const policeLayerGroup = L.layerGroup().addTo(map);
        const idLayerGroup = L.layerGroup().addTo(map);

        // Hàm tạo nội dung popup
        function generatePopupContent(loc, distanceStr = null) {
            let distHTML = '';
            if (distanceStr) {
                distHTML = `
                <div class="bg-green-100 text-green-800 text-xs font-bold px-2 py-1 rounded-md mb-2 inline-block">
                    📍 Cách bạn: ${distanceStr}
                </div>
               `;
            }
            return `
                <div class="p-1 min-w-[200px]">
                    <h3 class="font-bold text-[16px] text-gray-800 border-b pb-2 mb-2">${loc.name}</h3>
                    ${distHTML}
                    <p class="text-sm text-gray-600 mb-1">
                        <span class="font-semibold">📍 Địa chỉ:</span> ${loc.address}
                    </p>
                    <p class="text-sm text-gray-600 mb-2">
                        <span class="font-semibold">📞 SĐT:</span> <a href="tel:${loc.phone}" class="text-blue-600 hover:underline">${loc.phone}</a>
                    </p>
                    <a href="https://www.google.com/maps/dir/?api=1&destination=${loc.lat},${loc.lng}" target="_blank" 
                       class="block w-full text-center bg-blue-600 text-white py-2 rounded-md text-sm font-semibold hover:bg-blue-700 transition">
                       Chỉ đường (Mở Google Maps)
                    </a>
                </div>
            `;
        }

        locations.forEach(loc => {
            const isPolice = loc.type === "police_station";
            const iconToUse = isPolice ? policeIcon : idIcon;
            const targetLayer = isPolice ? policeLayerGroup : idLayerGroup;

            // Nội dung bảng thông tin khi bấm vào
            const popupContent = generatePopupContent(loc);

            const marker = L.marker([loc.lat, loc.lng], { icon: iconToUse })
                .bindPopup(popupContent, { className: 'custom-popup' })
                .addTo(targetLayer);

            // Lưu marker vào object loc để dùng sau này (cập nhật popup hiển thị khoảng cách)
            loc.marker = marker;

            // ==========================================
            // LỰA CHỌN THÊM DÀNH CHO ANH PHƯƠNG:
            // Nếu anh muốn: BẤM 1 LẦN VÀO ICON LÀ CHUYỂN SANG GOOGLE MAPS LUÔN
            // Thì anh hãy BỎ ghi chú khối lệnh dưới đây:
            // marker.on('click', function() {
            //     window.open(`https://www.google.com/maps/dir/?api=1&destination=${loc.lat},${loc.lng}`, '_blank');
            // });
            // ==========================================
        });

        // ==========================================
        // TÍNH NĂNG TÌM KIẾM ĐỊA ĐIỂM
        // ==========================================
        const searchInput = document.getElementById('search-input');

        searchInput.addEventListener('input', function (e) {
            const searchTerm = e.target.value.toLowerCase().trim();
            const showPolice = document.getElementById('filter-police').checked;
            const showId = document.getElementById('filter-id').checked;

            locations.forEach(loc => {
                const isPolice = loc.type === "police_station";
                const matchesFilter = (isPolice && showPolice) || (!isPolice && showId);
                const matchesSearch = loc.name.toLowerCase().includes(searchTerm) ||
                    loc.address.toLowerCase().includes(searchTerm);

                if (matchesFilter && matchesSearch) {
                    if (!map.hasLayer(loc.marker)) {
                        loc.marker.addTo(isPolice ? policeLayerGroup : idLayerGroup);
                    }
                } else {
                    if (map.hasLayer(loc.marker)) {
                        map.removeLayer(loc.marker);
                    }
                }
            });
        });

        // ==========================================
        // TÍNH NĂNG TÌM ĐIỂM GẦN NHẤT & ĐỊNH VỊ
        // ==========================================
        function getDistanceFromLatLonInKm(lat1, lon1, lat2, lon2) {
            const R = 6371; // Bán kính trái đất (km)
            const dLat = (lat2 - lat1) * (Math.PI / 180);
            const dLon = (lon2 - lon1) * (Math.PI / 180);
            const a =
                Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                Math.cos(lat1 * (Math.PI / 180)) * Math.cos(lat2 * (Math.PI / 180)) *
                Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            const d = R * c;
            return d;
        }

        let userMarker = null;

        document.getElementById('find-location-btn').addEventListener('click', () => {
            if (!navigator.geolocation) {
                alert("Trình duyệt của bạn không hỗ trợ định vị (Geolocation).");
                return;
            }

            const btn = document.getElementById('find-location-btn');
            const originalHTML = btn.innerHTML;
            // Hiển thị icon loading xoay
            btn.innerHTML = `<svg class="animate-spin h-6 w-6 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`;

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const userLat = position.coords.latitude;
                    const userLng = position.coords.longitude;
                    btn.innerHTML = originalHTML;

                    if (userMarker) {
                        userMarker.setLatLng([userLat, userLng]);
                    } else {
                        userMarker = L.circleMarker([userLat, userLng], {
                            radius: 8,
                            fillColor: "#2563eb", /* Tailwind blue-600 */
                            color: "#ffffff",
                            weight: 2,
                            opacity: 1,
                            fillOpacity: 0.9
                        }).addTo(map).bindPopup("<b>Vị trí hiện tại của bạn</b>");
                    }

                    // Tìm điểm Công an gần nhất dựa trên bộ lọc đang bật
                    let closestLoc = null;
                    let minDistance = Infinity;

                    const showPolice = document.getElementById('filter-police').checked;
                    const showId = document.getElementById('filter-id').checked;

                    locations.forEach(loc => {
                        const isPolice = loc.type === "police_station";
                        // Chỉ tính khoảng cách cho những loại đang được bộ lọc bật
                        if ((isPolice && showPolice) || (!isPolice && showId)) {
                            const dist = getDistanceFromLatLonInKm(userLat, userLng, loc.lat, loc.lng);
                            if (dist < minDistance) {
                                minDistance = dist;
                                closestLoc = loc;
                            }
                        }
                    });

                    if (closestLoc) {
                        // Bay bản đồ tới điểm gần nhất
                        map.flyTo([closestLoc.lat, closestLoc.lng], 14, {
                            animate: true,
                            duration: 1.5
                        });

                        // Cập nhật popup điểm gần nhất với label "Cách bạn: ..."
                        const distStr = minDistance < 1 ? (minDistance * 1000).toFixed(0) + " mét" : minDistance.toFixed(1) + " km";
                        const newPopupContent = generatePopupContent(closestLoc, distStr);
                        closestLoc.marker.setPopupContent(newPopupContent);

                        setTimeout(() => {
                            closestLoc.marker.openPopup();
                        }, 800);
                    } else {
                        alert("Không tìm thấy trụ sở nào phù hợp với bộ lọc hiện tại.");
                    }
                },
                (error) => {
                    btn.innerHTML = originalHTML;
                    alert("Không thể lấy được vị trí của bạn. Vui lòng kiểm tra lại quyền truy cập vị trí trên trình duyệt hoặc điện thoại.");
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        });

        // 5. XỬ LÝ SỰ KIỆN BỘ LỌC VÀ MENU
        function applyFilters() {
            // Kích hoạt event input để chạy lại logic lọc (kết hợp cả Text Search + Checkbox)
            const event = new Event('input');
            document.getElementById('search-input').dispatchEvent(event);
        }

        document.getElementById('filter-police').addEventListener('change', applyFilters);
        document.getElementById('filter-id').addEventListener('change', applyFilters);

        // Xử lý menu mobile
        const menuBtn = document.getElementById('menu-btn');
        const sidebar = document.getElementById('sidebar');
        menuBtn.addEventListener('click', () => {
            sidebar.classList.toggle('-translate-x-full');
        });

    </script>
</body>

</html>
